<!DOCTYPE html>
<html>
<head>
<title>Neer Ranjan Resume Builder</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.9.2/html2pdf.bundle.min.js"></script>

<style>
body {
    margin:0;
    font-family: 'Segoe UI';
    background:#eef2f7;
}

/* HEADER */
.header {
    background: linear-gradient(135deg,#4facfe,#00c6ff);
    color:white;
    text-align:center;
    padding:15px;
    font-size:22px;
}

/* LAYOUT */
.container {
    display:flex;
    padding:20px;
    gap:20px;
}

/* FORM */
.form {
    width:30%;
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 5px 15px rgba(0,0,0,0.1);
}

.preview {
    width:70%;
}

/* INPUT */
input, textarea, select {
    width:100%;
    padding:10px;
    margin:8px 0;
    border-radius:6px;
    border:1px solid #ccc;
}

button {
    width:48%;
    padding:10px;
    margin-top:10px;
    border:none;
    border-radius:6px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:hover {
    background:#0056b3;
}

/* RESUME DESIGN */
.resume-box {
    width:100%;
    max-width:800px;
    margin:auto;
    background:white;
    display:flex;
    box-shadow:0 10px 30px rgba(0,0,0,0.2);
}

.left {
    width:30%;
    background:#2c3e50;
    color:white;
    padding:20px;
    text-align:center;
}

.left img {
    width:100px;
    height:100px;
    border-radius:50%;
    margin-bottom:10px;
}

.right {
    width:70%;
    padding:20px;
}

h2 {
    margin-top:0;
}

.section {
    margin-top:15px;
}

.section h3 {
    border-bottom:2px solid #ddd;
}
</style>
</head>

<body>

<div class="header">Neer Ranjan Resume Builder</div>

<div class="container">

<div class="form">

<input type="file" id="photo">

<input type="text" id="name" placeholder="Name">
<input type="text" id="email" placeholder="Email">
<input type="text" id="phone" placeholder="Phone">
<input type="text" id="skills" placeholder="Skills">
<input type="text" id="education" placeholder="Education">
<textarea id="experience" placeholder="Experience"></textarea>

<button onclick="generateResume()">Preview</button>
<button onclick="downloadPDF()">Download</button>

</div>

<div class="preview">
<div id="resume"></div>
</div>

</div>

<script>
function generateResume(){

let name = document.getElementById("name").value || "Your Name";
let email = document.getElementById("email").value || "Email";
let phone = document.getElementById("phone").value || "Phone";
let skills = document.getElementById("skills").value || "Skills";
let education = document.getElementById("education").value || "Education";
let experience = document.getElementById("experience").value || "Experience";

let photo = document.getElementById("photo").files[0];
let img = photo ? URL.createObjectURL(photo) : "https://via.placeholder.com/100";

document.getElementById("resume").innerHTML = `
<div class="resume-box">

<div class="left">
<img src="${img}">
<h3>${name}</h3>

<div class="section">
<h4>Contact</h4>
<p>${email}</p>
<p>${phone}</p>
</div>

<div class="section">
<h4>Skills</h4>
<p>${skills}</p>
</div>

</div>

<div class="right">

<div class="section">
<h3>Education</h3>
<p>${education}</p>
</div>

<div class="section">
<h3>Experience</h3>
<p>${experience}</p>
</div>

</div>

</div>
`;
}

function downloadPDF(){
let element = document.getElementById("resume");
html2pdf().from(element).save("Neer_Ranjan_CV.pdf");
}
</script>

</body>
</html>
